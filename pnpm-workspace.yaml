packages:
  - packages/*
  - apps/*
allowBuilds:
  "@nestjs/core": true
  "@swc/core": true
  esbuild: true
  mongodb-memory-server: true
  redis-memory-server: true
  sharp: true
  simple-git-hooks: true
  unrs-resolver: true
  workerd: true
publicHoistPattern:
  - "*fastify*"
  - mongodb
  - "*eslint*"
  - "*webpack*"
strictPeerDependencies: false
