packages:
  - packages/*
  - apps/*
allowBuilds:
  '@google/genai': set this to true or false
  "@nestjs/core": true
  '@parcel/watcher': false
  "@swc/core": true
  cpu-features: false
  esbuild: true
  mongodb-memory-server: true
  msgpackr-extract: false
  protobufjs: false
  redis-memory-server: true
  sharp: true
  simple-git-hooks: true
  ssh2: false
  unrs-resolver: true
  workerd: true
overrides:
  "eslint-plugin-react-compiler>zod": 3.25.76
  "get-pixels@^3>request": ./external/request
  mongodb: ~7.2.0
  pino: ./external/pino
  rolldown: 1.0.1
  semver: 7.8.1
  typescript: 6.0.3
  whatwg-url: 16.0.1
  zod: 4.4.3
  "lodash-es@<4.18.0": 4.18.1
  "nanoid@<3.3.8": 3.3.12
  "nanoid@>=4.0.0 <5.0.9": 5.1.11
  "tmp@<0.2.6": 0.2.6
  "uuid@<11.1.1": 11.1.1
  lucide-react: 1.8.0
  "@codemirror/state": 6.6.0
  "@codemirror/view": 6.42.1
  "@codemirror/commands": 6.10.3
  "@codemirror/language": 6.12.3
publicHoistPattern:
  - "*fastify*"
  - mongodb
  - "*eslint*"
  - "*webpack*"
  - "*@codemirror*"
strictPeerDependencies: false
minimumReleaseAgeExclude:
  - "@haklex/*"
  - "@mx-space/*"
  - "@babel/*"
