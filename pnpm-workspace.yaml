packages:
  - packages/*
  - apps/*
allowBuilds:
  "@google/genai": false
  "@nestjs/core": true
  "@parcel/watcher": false
  "@swc/core": true
  cpu-features: false
  esbuild: true
  mongodb-memory-server: true
  msgpackr-extract: false
  protobufjs: false
  redis-memory-server: true
  sharp: true
  simple-git-hooks: true
  ssh2: false
  unrs-resolver: true
  workerd: true
overrides:
  "eslint-plugin-react-compiler>zod": 3.25.76
  "get-pixels@^3>request": ./external/request
  kysely: 0.28.17
  mongodb: ~7.3.0
  pino: ./external/pino
  rolldown: 1.1.0
  semver: 7.8.4
  typescript: 6.0.3
  whatwg-url: 16.0.1
  zod: 4.4.3
  "lodash-es@<4.18.0": 4.18.1
  "nanoid@<3.3.8": 3.3.12
  "nanoid@>=4.0.0 <5.0.9": 5.1.11
  "tmp@<0.2.6": 0.2.7
  "uuid@<11.1.1": 11.1.1
  lucide-react: 1.17.0
  "@codemirror/state": 6.6.0
  "@codemirror/view": 6.43.1
  "@codemirror/commands": 6.10.3
  "@codemirror/language": 6.12.3
publicHoistPattern:
  - "*fastify*"
  - mongodb
  - "*eslint*"
  - "*webpack*"
  - "*@codemirror*"
strictPeerDependencies: false
minimumReleaseAgeExclude:
  - "@haklex/*"
  - "@mx-space/*"
  - "@babel/*"
  - '@cloudflare/workers-types@4.20260611.1'
  - '@code-inspector/core@1.5.4'
  - '@code-inspector/esbuild@1.5.4'
  - '@code-inspector/mako@1.5.4'
  - '@code-inspector/turbopack@1.5.4'
  - '@code-inspector/vite@1.5.4'
  - '@code-inspector/webpack@1.5.4'
  - '@nestjs/cache-manager@3.1.3'
  - '@pierre/theming@0.0.1'
  - '@types/node@25.9.3'
  - '@types/nodemailer@8.0.1'
  - code-inspector-plugin@1.5.4
  - jotai@2.20.1
  - nodemailer@8.0.11
